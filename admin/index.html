<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #D94F8C;
      --pink-light: #FF8FC8;
      --pink-bg: #FFF0F7;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #f0d6e8;
      --green: #10b981;
      --red: #ef4444;
      --gold: #f59e0b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 40%, #f5f3ff 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(217,79,140,0.15), 0 4px 16px rgba(0,0,0,0.06);
      text-align: center;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--pink), var(--pink-light));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }

    .login-card h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      background: var(--pink-bg);
    }

    .input-group input:focus {
      border-color: var(--pink);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--pink), #b83678);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; min-height: 100vh; }

    .topbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(217,79,140,0.08);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--pink), var(--pink-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .topbar-brand h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .topbar-brand span {
      font-size: 12px;
      background: linear-gradient(135deg, var(--pink), var(--pink-light));
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 6px;
    }

    .btn-logout {
      padding: 8px 20px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--pink); color: var(--pink); }

    .dashboard-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 38px;
      font-weight: 800;
      color: var(--pink);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title span {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Table ── */
    .table-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--pink-bg);
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--pink);
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-top: 1px solid #fdf2f8;
    }

    tr:hover td { background: #fdf9fb; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-pink { background: #fce7f3; color: var(--pink); }
    .badge-green { background: #d1fae5; color: var(--green); }

    /* ── Stars ── */
    .stars { color: var(--gold); font-size: 15px; }

    /* ── Search ── */
    .search-bar {
      padding: 10px 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 260px;
      transition: border-color 0.2s;
      background: var(--pink-bg);
    }

    .search-bar:focus { border-color: var(--pink); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ── Loading ── */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }

    .empty-state div { font-size: 40px; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .dashboard-content { padding: 16px; }
      .login-card { padding: 32px 24px; }
      th, td { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌸</div>
    <h1>Glow Admin</h1>
    <p>Enter your admin key to access the dashboard</p>
    <div class="input-group">
      <input type="password" id="admin-key-input" placeholder="Admin key" autocomplete="current-password" />
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    <div class="error-msg" id="login-error">Invalid admin key. Please try again.</div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🌸</div>
      <h2>Glow Admin <span>ADMIN</span></h2>
    </div>
    <button class="btn-logout" onclick="doLogout()">Log out</button>
  </div>

  <div class="dashboard-content">
    <div id="loading"><div class="spinner"></div></div>
    <div id="content" style="display:none">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- Users Table -->
      <div class="section-header">
        <div class="section-title">👩 Registered Users <span id="user-count"></span></div>
        <input class="search-bar" type="text" placeholder="🔍  Search users…" oninput="filterUsers(this.value)" />
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>Email</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>

      <!-- Ratings Table -->
      <div class="section-header">
        <div class="section-title">⭐ App Ratings <span id="rating-count"></span></div>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Stars</th>
              <th>Feedback</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ratings-table"></tbody>
        </table>
      </div>

    </div><!-- /content -->
  </div>
</div>

<script>
  const API = 'https://women-tracker-1.onrender.com/api';
  let adminKey = '';
  let allUsers = [];

  // ── Login ────────────────────────────────────────────────────────────────
  document.getElementById('admin-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const key = document.getElementById('admin-key-input').value.trim();
    if (!key) return;

    const btn = document.querySelector('.btn-primary');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/admin/dashboard`, {
        headers: { 'x-admin-key': key }
      });

      if (res.ok) {
        adminKey = key;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDashboard();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    } catch (err) {
      document.getElementById('login-error').textContent = 'Could not connect to server. Try again later.';
      document.getElementById('login-error').style.display = 'block';
    }

    btn.textContent = 'Sign In →';
    btn.disabled = false;
  }

  function doLogout() {
    adminKey = '';
    allUsers = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('admin-key-input').value = '';
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('content').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
  }

  // ── Load Data ────────────────────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const res = await fetch(`${API}/admin/dashboard`, {
        headers: { 'x-admin-key': adminKey }
      });
      const data = await res.json();

      allUsers = data.users || [];
      const ratings = data.ratings || [];

      // Stats
      const avgRating = ratings.length
        ? (ratings.reduce((s, r) => s + r.stars, 0) / ratings.length).toFixed(1)
        : '–';

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-value">${allUsers.length}</div>
          <div class="stat-sub">registered accounts</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">App Ratings</div>
          <div class="stat-value">${ratings.length}</div>
          <div class="stat-sub">total reviews</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg. Rating</div>
          <div class="stat-value">${avgRating}</div>
          <div class="stat-sub">out of 5 ⭐</div>
        </div>
      `;

      // Users
      renderUsers(allUsers);
      document.getElementById('user-count').textContent = `(${allUsers.length})`;

      // Ratings
      const ratingsBody = document.getElementById('ratings-table');
      ratingsBody.innerHTML = ratings.length === 0
        ? `<tr><td colspan="4"><div class="empty-state"><div>⭐</div>No ratings yet.</div></td></tr>`
        : ratings.map(r => `
          <tr>
            <td><span class="badge badge-pink">${r.user?.username || 'Deleted user'}</span></td>
            <td><span class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span> <strong>${r.stars}/5</strong></td>
            <td>${r.feedback || '<span style="color:#9ca3af">No feedback</span>'}</td>
            <td>${new Date(r.createdAt).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })}</td>
          </tr>`).join('');

      document.getElementById('rating-count').textContent = `(${ratings.length})`;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (err) {
      document.getElementById('loading').innerHTML = '<div class="empty-state"><div>❌</div>Failed to load data. Check your connection.</div>';
    }
  }

  function renderUsers(users) {
    const body = document.getElementById('users-table');
    if (users.length === 0) {
      body.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div>👩</div>No users yet.</div></td></tr>`;
      return;
    }
    body.innerHTML = users.map((u, i) => `
      <tr>
        <td style="color:var(--muted);font-size:13px">${i + 1}</td>
        <td><strong>${u.username || '–'}</strong></td>
        <td>${u.email || '–'}</td>
        <td>${new Date(u.createdAt).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })}</td>
      </tr>`).join('');
  }

  function filterUsers(query) {
    const q = query.toLowerCase();
    const filtered = allUsers.filter(u =>
      (u.username || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q)
    );
    renderUsers(filtered);
  }
</script>
</body>
</html>
