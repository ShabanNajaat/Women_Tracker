name: glow_mobile
description: A wellness and cycle tracker mobile app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  lucide_icons: ^0.257.0
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  url_launcher: ^6.2.5
  record: ^5.1.0
  audioplayers: ^5.2.1
  path_provider: ^2.1.2
  path: ^1.9.0
  image_picker: ^1.1.2
  flutter_timezone: ^3.0.1
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  pdf: ^3.12.0
  printing: ^5.14.3
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  health: ^11.1.1
  socket_io_client: ^3.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/



